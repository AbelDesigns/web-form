<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Briefing de Proyecto Web | Abel Acosta</title>
    <!-- Fuentes y Estilos -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para que funcione en un solo archivo -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .selection-red::selection { background-color: #FF3131; color: white; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Ocultar scrollbar en textareas de resumen */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F8FAFC] selection-red text-[#1E293B]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Componente de Icono SVG nativo para evitar conflictos con React Reconciliation
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                'user': <g><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></g>,
                'trending-up': <g><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></g>,
                'palette': <g><circle cx="12" cy="12" r="10"/><path d="M12 21a9 9 0 0 1 0-18c4.97 0 9 3.58 9 8 0 1.5-1.5 3-3 3-1.07 0-2.09-.43-2.83-1.17-.31-.3-.69-.53-1.17-.53a1.5 1.5 0 0 0-1.5 1.5c0 .33.09.64.24.91C12.96 17.5 13 18.5 13 19a2 2 0 0 1-1 2z"/><circle cx="7.5" cy="10.5" r=".5"/><circle cx="10.5" cy="7.5" r=".5"/><circle cx="13.5" cy="7.5" r=".5"/><circle cx="16.5" cy="10.5" r=".5"/></g>,
                'layout': <g><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></g>,
                'globe': <g><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></g>,
                'clipboard-check': <g><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></g>,
                'alert-circle': <g><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></g>,
                'check': <g><polyline points="20 6 9 17 4 12"/></g>,
                'file-search': <g><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><circle cx="11.5" cy="15.5" r="2.5"/><path d="M13.3 17.3 15 19"/></g>,
                'chevron-right': <g><polyline points="9 18 15 12 9 6"/></g>,
                'chevron-left': <g><polyline points="15 18 9 12 15 6"/></g>,
                'loader-2': <g><path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/></g>,
                'send': <g><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></g>,
                'dollar-sign': <g><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></g>,
                'shield-check': <g><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></g>
            };

            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [step, setStep] = useState(1);
            const [submitted, setSubmitted] = useState(false);
            const [isSending, setIsSending] = useState(false);
            const [error, setError] = useState(null);
            const [isConfirmed, setIsConfirmed] = useState(false);

            const FORMSPREE_ENDPOINT = "https://formspree.io/f/xrerwnwr";
            const logoUrl = "https://i.postimg.cc/vBLLZhG7/Group-14.png";

            const [formData, setFormData] = useState({
                nombreContacto: '',
                email: '',
                nombreEmpresa: '',
                historiaEmpresa: '',
                valorDiferencial: '',
                perfilCliente: '',
                objetivosWeb: '',
                referenciasVisuales: '',
                seccionesMarcadas: [],
                detallesPorSeccion: {},
                lanzamientoDeseado: ''
            });

            // Cálculo de costos
            const budgetBreakdown = useMemo(() => {
                let base = 100;
                let landingCost = formData.seccionesMarcadas.includes("Landing page (Página única)") ? 80 : 0;
                let extraPageCost = formData.seccionesMarcadas.includes("Página extra") ? 30 : 0;
                let otherCost = formData.seccionesMarcadas.includes("Otro") ? 30 : 0;
                
                return {
                    base,
                    landing: landingCost,
                    extra: extraPageCost,
                    other: otherCost,
                    total: base + landingCost + extraPageCost + otherCost
                };
            }, [formData.seccionesMarcadas]);

            const opcionesSecciones = [
                "Página de inicio (Home)",
                "Landing page (Página única)",
                "Quiénes somos / Historia",
                "Servicios o productos detallados",
                "Portafolio o galería de proyectos",
                "Blog o sección de noticias",
                "Preguntas frecuentes (FAQ)",
                "Contacto y mapa de ubicación",
                "Página extra",
                "Otro"
            ];

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleCheckboxChange = (seccion) => {
                setFormData(prev => {
                    const nuevasSecciones = prev.seccionesMarcadas.includes(seccion)
                        ? prev.seccionesMarcadas.filter(s => s !== seccion)
                        : [...prev.seccionesMarcadas, seccion];
                    return { ...prev, seccionesMarcadas: nuevasSecciones };
                });
            };

            const handleDetalleChange = (seccion, valor) => {
                setFormData(prev => ({
                    ...prev,
                    detallesPorSeccion: { ...prev.detallesPorSeccion, [seccion]: valor }
                }));
            };

            const validateStep = () => {
                if (step === 1) {
                    if (!formData.nombreContacto.trim() || !formData.email.trim()) {
                        setError("Por favor, completa tu nombre y correo electrónico antes de continuar.");
                        return false;
                    }
                }
                setError(null);
                return true;
            };

            const nextStep = () => {
                if (validateStep()) setStep(prev => prev + 1);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!isConfirmed) return;

                setIsSending(true);
                setError(null);

                const payload = {
                    ...formData,
                    seccionesSeleccionadas: formData.seccionesMarcadas.join(", "),
                    detallesEspecificos: JSON.stringify(formData.detallesPorSeccion),
                    inversionEstimada: `$${budgetBreakdown.total}`,
                    politicaPrivacidad: "Aceptada - El cliente acepta el tratamiento confidencial de sus datos."
                };

                try {
                    const response = await fetch(FORMSPREE_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        setSubmitted(true);
                    } else {
                        throw new Error("Ocurrió un error al enviar el formulario. Por favor, revisa tu conexión.");
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsSending(false);
                }
            };

            if (submitted) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 animate-fade-in">
                        <div className="max-w-md w-full bg-white rounded-3xl p-12 text-center shadow-xl border border-gray-100">
                            <div className="w-24 h-24 mx-auto mb-8 bg-[#0A0A0A] rounded-full flex items-center justify-center p-4">
                                <img src={logoUrl} alt="Logo" className="w-full h-full object-contain" />
                            </div>
                            <h2 className="text-2xl font-extrabold text-gray-900 mb-4 text-center tracking-tight">¡Información enviada!</h2>
                            <p className="text-gray-600 mb-10 text-sm leading-relaxed">Tu briefing ha sido procesado con éxito y bajo total confidencialidad. Abel Acosta revisará tu información para presentarte una propuesta próximamente.</p>
                            <button onClick={() => window.location.reload()} className="w-full bg-[#1E293B] text-white font-bold py-4 px-6 rounded-xl hover:bg-[#FF3131] transition-all transform active:scale-95 shadow-lg shadow-slate-200">Volver al inicio</button>
                        </div>
                    </div>
                );
            }

            const renderStep = () => {
                switch(step) {
                    case 1: return (
                        <div className="space-y-6 animate-fade-in">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="flex flex-col"><label className="text-sm font-bold text-gray-700 mb-2">Nombre de contacto *</label><input required type="text" name="nombreContacto" value={formData.nombreContacto} onChange={handleChange} placeholder="Tu nombre completo" className="p-4 border border-gray-200 rounded-xl focus:ring-1 focus:ring-[#FF3131] outline-none transition-all bg-white" /></div>
                                <div className="flex flex-col"><label className="text-sm font-bold text-gray-700 mb-2">Correo electrónico *</label><input required type="email" name="email" value={formData.email} onChange={handleChange} placeholder="ejemplo@correo.com" className="p-4 border border-gray-200 rounded-xl focus:ring-1 focus:ring-[#FF3131] outline-none transition-all bg-white" /></div>
                            </div>
                            <div className="flex flex-col"><label className="text-sm font-bold text-gray-700 mb-2">Nombre del proyecto</label><input type="text" name="nombreEmpresa" value={formData.nombreEmpresa} onChange={handleChange} placeholder="Empresa o Marca Personal" className="p-4 border border-gray-200 rounded-xl focus:ring-1 focus:ring-[#FF3131] outline-none transition-all bg-white" /></div>
                            <div className="flex flex-col"><label className="text-sm font-bold text-gray-700 mb-2">Historia y valores</label><textarea name="historiaEmpresa" value={formData.historiaEmpresa} onChange={handleChange} placeholder="Cuéntanos brevemente qué quieres transmitir con tu nueva web..." className="p-4 border border-gray-200 rounded-xl h-28 focus:ring-1 focus:ring-[#FF3131] outline-none resize-none transition-all bg-white"></textarea></div>
                        </div>
                    );
                    case 2: return (
                        <div className="space-y-6 animate-fade-in">
                            <div className="flex flex-col"><label className="text-sm font-bold text-gray-700 mb-2">Público o cliente ideal</label><textarea name="perfilCliente" value={formData.perfilCliente} onChange={handleChange} placeholder="¿A quién va dirigida la web? (Edad, ubicación, intereses...)" className="p-4 border border-gray-200 rounded-xl h-24 focus:ring-1 focus:ring-[#FF3131] outline-none resize-none transition-all bg-white"></textarea></div>
                            <div className="flex flex-col"><label className="text-sm font-bold text-gray-700 mb-2">Diferenciador del proyecto</label><input type="text" name="valorDiferencial" value={formData.valorDiferencial} onChange={handleChange} placeholder="¿Qué te hace único frente a la competencia?" className="p-4 border border-gray-200 rounded-xl focus:ring-1 focus:ring-[#FF3131] outline-none transition-all bg-white" /></div>
                        </div>
                    );
                    case 3: return (
                        <div className="space-y-6 animate-fade-in">
                            <div className="bg-red-50 p-5 rounded-2xl border border-red-100 flex gap-3 items-start text-red-900"><Icon name="palette" size={20} className="mt-0.5 shrink-0" /><p className="text-sm font-medium">Si dispones de manual de marca o brochure, nos basaremos en él para asegurar la total coherencia visual de tu proyecto.</p></div>
                            <div className="flex flex-col"><label className="text-sm font-bold text-gray-700 mb-2">Referencias visuales</label><textarea name="referenciasVisuales" value={formData.referenciasVisuales} onChange={handleChange} placeholder="Pega aquí enlaces de sitios web que te gusten o reflejen tu estilo..." className="p-4 border border-gray-200 rounded-xl h-40 focus:ring-1 focus:ring-[#FF3131] outline-none resize-none transition-all bg-white"></textarea></div>
                        </div>
                    );
                    case 4: return (
                        <div className="space-y-6 animate-fade-in">
                            <label className="text-sm font-bold text-gray-700 block mb-4">Selecciona las secciones necesarias:</label>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                {opcionesSecciones.map(opc => (
                                    <button key={opc} type="button" onClick={() => handleCheckboxChange(opc)} className={`flex items-center gap-3 p-4 rounded-xl border transition-all text-left ${formData.seccionesMarcadas.includes(opc) ? 'bg-[#1E293B] border-[#1E293B] text-white shadow-md' : 'bg-white text-gray-600 border-gray-200 hover:border-[#FF3131]/30'}`}>
                                        <div className={`w-5 h-5 rounded flex items-center justify-center transition-colors ${formData.seccionesMarcadas.includes(opc) ? 'bg-[#FF3131]' : 'bg-gray-100 border border-gray-300'}`}>
                                            {formData.seccionesMarcadas.includes(opc) && <Icon name="check" size={14} className="text-white" />}
                                        </div>
                                        <span className="text-sm font-semibold">{opc}</span>
                                    </button>
                                ))}
                            </div>
                            <div className="space-y-3">
                                {formData.seccionesMarcadas.includes("Landing page (Página única)") && (
                                    <div className="p-4 bg-red-50 border border-red-100 rounded-2xl flex gap-3 items-center">
                                        <Icon name="alert-circle" size={20} className="text-[#FF3131] shrink-0" />
                                        <p className="text-xs text-red-900 leading-tight"><strong>Aviso de servicio:</strong> La Landing Page tiene un costo adicional de <strong>80$</strong> por unidad.</p>
                                    </div>
                                )}
                                {(formData.seccionesMarcadas.includes("Otro") || formData.seccionesMarcadas.includes("Página extra")) && (
                                    <div className="p-4 bg-red-50 border border-red-100 rounded-2xl flex gap-3 items-center">
                                        <Icon name="alert-circle" size={20} className="text-[#FF3131] shrink-0" />
                                        <p className="text-xs text-red-900 leading-tight"><strong>Aviso de servicio:</strong> Las páginas extras tienen un costo de <strong>30$</strong> por unidad.</p>
                                    </div>
                                )}
                            </div>
                            {formData.seccionesMarcadas.length > 0 && (
                                <div className="pt-6 border-t border-gray-100 space-y-4">
                                    <label className="text-sm font-bold text-[#FF3131]">Información detallada de secciones:</label>
                                    {formData.seccionesMarcadas.map(s => (
                                        <div key={s} className="space-y-2">
                                            <div className="flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-[#FF3131]"></div><span className="text-xs font-bold text-gray-900 uppercase tracking-tight">{s}</span></div>
                                            <textarea value={formData.detallesPorSeccion[s] || ''} onChange={(e) => handleDetalleChange(s, e.target.value)} placeholder={`¿Qué debe incluir la sección de ${s.toLowerCase()}?`} className="w-full p-3 border border-gray-200 rounded-xl h-24 text-sm focus:ring-1 focus:ring-[#FF3131] outline-none resize-none bg-white shadow-sm"></textarea>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    );
                    case 5: return (
                        <div className="space-y-6 animate-fade-in">
                            <div className="flex flex-col"><label className="text-sm font-bold text-gray-700 mb-2">Fecha estimada de entrega</label><input type="text" name="lanzamientoDeseado" value={formData.lanzamientoDeseado} onChange={handleChange} placeholder="Ej: Mediados del próximo mes" className="p-4 border border-gray-200 rounded-xl focus:ring-1 focus:ring-[#FF3131] outline-none bg-white shadow-sm" /></div>
                        </div>
                    );
                    case 6: return (
                        <div className="space-y-6 animate-fade-in">
                            <div className="bg-[#1E293B] text-white p-6 rounded-2xl shadow-inner border border-slate-700">
                                <h3 className="text-lg font-bold mb-4 flex items-center gap-2 border-b border-slate-700 pb-3">
                                    <Icon name="file-search" size={20} className="text-[#FF3131]" /> 
                                    Resumen de tu solicitud
                                </h3>
                                <div className="space-y-3 text-sm text-slate-300">
                                    <p className="flex justify-between"><strong>Cliente:</strong> <span className="text-white">{formData.nombreContacto || 'No indicado'}</span></p>
                                    <p className="flex justify-between"><strong>Proyecto:</strong> <span className="text-white">{formData.nombreEmpresa || 'No indicado'}</span></p>
                                    <div className="pt-2">
                                        <p className="font-bold mb-1">Secciones:</p>
                                        <p className="text-white text-xs leading-relaxed">{formData.seccionesMarcadas.length > 0 ? formData.seccionesMarcadas.join(", ") : 'Ninguna seleccionada'}</p>
                                    </div>
                                </div>

                                <div className="mt-6 pt-5 border-t border-slate-700 space-y-3">
                                    <h4 className="text-xs font-bold text-[#FF3131] uppercase tracking-widest mb-4 flex items-center gap-2">
                                        <Icon name="dollar-sign" size={14} /> Desglose de Inversión
                                    </h4>
                                    <div className="space-y-2 text-xs">
                                        <div className="flex justify-between items-center">
                                            <span>Servicio Base Diseño Web</span>
                                            <span className="text-white font-bold">${budgetBreakdown.base}</span>
                                        </div>
                                        {budgetBreakdown.landing > 0 && (
                                            <div className="flex justify-between items-center text-slate-400">
                                                <span>Suplemento Landing Page</span>
                                                <span className="text-white font-bold">+${budgetBreakdown.landing}</span>
                                            </div>
                                        )}
                                        {(budgetBreakdown.extra > 0 || budgetBreakdown.other > 0) && (
                                            <div className="flex justify-between items-center text-slate-400">
                                                <span>Páginas adicionales / Otros</span>
                                                <span className="text-white font-bold">+${budgetBreakdown.extra + budgetBreakdown.other}</span>
                                            </div>
                                        )}
                                    </div>
                                    <div className="mt-4 p-3 bg-slate-800/50 rounded-xl flex justify-between items-center border border-slate-700/50">
                                        <span className="text-sm font-bold text-white uppercase">Inversión Total Estimada</span>
                                        <span className="text-xl font-black text-[#FF3131]">${budgetBreakdown.total}</span>
                                    </div>
                                </div>
                            </div>

                            {/* Sección de Privacidad y Confidencialidad */}
                            <div className="p-6 border-2 border-dashed border-gray-200 rounded-2xl space-y-5 bg-white/50 relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-3 opacity-5">
                                    <Icon name="shield-check" size={80} />
                                </div>
                                <div className="flex items-start gap-4 relative z-10">
                                    <button 
                                        type="button" 
                                        onClick={() => setIsConfirmed(!isConfirmed)} 
                                        className={`mt-1 w-6 h-6 rounded flex items-center justify-center shrink-0 border-2 transition-all ${isConfirmed ? 'bg-[#FF3131] border-[#FF3131] shadow-lg shadow-red-100' : 'bg-white border-gray-300'}`}
                                    >
                                        {isConfirmed && <Icon name="check" size={16} className="text-white" />}
                                    </button>
                                    <div className="space-y-2">
                                        <p className="text-sm font-bold text-gray-900 leading-tight">He revisado la información y acepto el tratamiento de mis datos.</p>
                                        <p className="text-[11px] text-gray-500 leading-relaxed">
                                            Acepto que Abel Acosta trate mis datos personales y los detalles de mi proyecto bajo estricta **confidencialidad**. Esta información se utilizará exclusivamente para la elaboración de la propuesta de diseño y no será compartida con terceros.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                    default: return null;
                }
            };

            return (
                <div className="py-12 max-w-4xl mx-auto w-full">
                    <div className="text-center mb-12 px-4">
                        <div className="inline-flex w-20 h-20 mb-6 rounded-full overflow-hidden bg-[#0A0A0A] shadow-lg">
                            <img src={logoUrl} alt="Logo" className="w-full h-full object-contain" />
                        </div>
                        <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight mb-3 text-gray-900 leading-none tracking-tighter">Briefing de proyecto <span className="text-[#FF3131]">web</span></h1>
                        <p className="text-base text-gray-500 max-w-lg mx-auto leading-relaxed">Ayúdanos a entender tu visión para crear una experiencia digital de alto impacto.</p>
                    </div>

                    <div className="flex gap-2 mb-10 px-6">
                        {[1,2,3,4,5,6].map(i => (
                            <div key={i} className="flex-1">
                                <div className={`h-2 rounded-full transition-all duration-700 ${step >= i ? 'bg-[#FF3131]' : 'bg-slate-200'}`}></div>
                            </div>
                        ))}
                    </div>

                    <form onSubmit={handleSubmit} className="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-gray-100 overflow-hidden mx-4">
                        <div className="p-8 md:p-14">
                            <div className="flex items-center gap-4 mb-8">
                                <div className="p-3 bg-red-50 text-[#FF3131] rounded-xl">
                                    <Icon name={step === 1 ? 'user' : step === 2 ? 'trending-up' : step === 3 ? 'palette' : step === 4 ? 'layout' : step === 5 ? 'globe' : 'clipboard-check'} size={20} />
                                </div>
                                <div>
                                    <span className="text-xs font-bold text-[#FF3131] uppercase tracking-wider">Módulo {step} de 6</span>
                                    <h2 className="text-2xl font-black text-gray-900 tracking-tight leading-tight">{step === 1 ? 'Identidad' : step === 2 ? 'Estrategia' : step === 3 ? 'Estilo' : step === 4 ? 'Estructura' : step === 5 ? 'Logística' : 'Confirmación'}</h2>
                                </div>
                            </div>
                            
                            {error && (
                                <div className="mb-6 p-4 bg-red-50 border border-red-200 text-[#FF3131] rounded-xl text-sm font-bold flex items-center gap-2">
                                    <Icon name="alert-circle" size={18} /> {error}
                                </div>
                            )}

                            {renderStep()}
                        </div>

                        <div className="bg-[#F1F5F9]/50 px-8 py-8 flex justify-between items-center border-t border-slate-100">
                            <button type="button" onClick={() => setStep(step - 1)} disabled={step === 1 || isSending} className={`text-sm font-bold transition-all px-6 py-3 rounded-xl ${step === 1 ? 'opacity-0' : 'text-gray-500 hover:bg-gray-200'}`}>Regresar</button>
                            
                            {step < 6 ? (
                                <button type="button" onClick={nextStep} className="bg-[#1E293B] text-white px-8 py-4 rounded-xl font-extrabold text-sm hover:bg-[#FF3131] transition-all flex items-center gap-2 shadow-lg shadow-slate-200 active:scale-95">Continuar <Icon name="chevron-right" size={18}/></button>
                            ) : (
                                <button type="submit" disabled={isSending || !isConfirmed} className={`px-10 py-4 rounded-xl font-extrabold text-sm transition-all flex items-center gap-2 shadow-lg active:scale-95 ${isConfirmed ? 'bg-[#FF3131] text-white hover:bg-red-700 shadow-red-100' : 'bg-gray-200 text-gray-400 cursor-not-allowed shadow-none'}`}>
                                    {isSending ? 'Enviando...' : 'Finalizar y enviar'} <Icon name={isSending ? 'loader-2' : 'send'} size={18} className={isSending ? 'animate-spin' : ''}/>
                                </button>
                            )}
                        </div>
                    </form>

                    <div className="mt-12 text-center text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">
                        <p>formulario de consultoria web • Abel Acosta product designer • 2026</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
